# Read the Docs configuration file. See https://docs.readthedocs.io/en/stable/config-file/v2.html
# Uses uv (https://docs.astral.sh/uv/) for dependency management.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Install uv inside RTD's auto-created virtualenv so we can use it
      # to sync the project's dependencies into that same environment.
      - pip install uv
    post_install:
      # Install project + dev group (Sphinx, etc.) into the active env.
      - UV_PROJECT_ENVIRONMENT=$READTHEDOCS_VIRTUALENV_PATH uv sync --frozen

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
